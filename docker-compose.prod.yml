services:
  api:
    build: .
    ports:
      - "5100:8000"
    env_file:
      - .env
    environment:
      ENV_NAME: prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-ragchat}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ragchat_secret}
      POSTGRES_DB: ${DB_NAME:-ragchat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ragchat} -d ${DB_NAME:-ragchat}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
